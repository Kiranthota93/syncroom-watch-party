name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "sync-room-node/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sync-room-node

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sync-room-node/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check JavaScript Syntax
        run: npm run syntax-check

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/syncroom-watch-party

            git pull origin main

            cd sync-room-node

            npm ci

            pm2 reload syncroom-backend

      - name: Verify Health
        run: |
          sleep 5
          curl --fail https://syncroom-api.duckdns.org/health