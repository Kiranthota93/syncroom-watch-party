name: Deploy

# Runs on push to main only after the CI workflow passes
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Guard: skip if CI failed ───────────────────────────────────────────────
  check-ci:
    name: CI passed?
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "CI passed — proceeding with deploy"

  # ── Frontend → Vercel ──────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    needs: check-ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sync-room-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: sync-room-ui/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Vercel builds the project itself using VITE_API_URL set in the
      # Vercel project dashboard (Settings → Environment Variables).
      # Do NOT pre-build here — a pre-build with VITE_API_URL='' produces
      # relative /api paths that only work behind nginx, not on Vercel.
      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Backend → Render ───────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend → Render
    needs: check-ci
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy hook
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render response: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Render deploy hook failed with HTTP $STATUS"
            exit 1
          fi
